<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <style>
      .wm-text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 800;
        font-size: 48px;
        fill: rgba(255, 255, 255, 0.25);
        letter-spacing: 4px;
        filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
      }
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="none" />
  
  <!-- Diagonal repeating pattern -->
  <g transform="rotate(-30 300 200)">
    <text x="300" y="-100" text-anchor="middle" class="wm-text">PROMPTGALLERY.FUN</text>
    <text x="300" y="50" text-anchor="middle" class="wm-text">PROMPTGALLERY.FUN</text>
    <text x="300" y="200" text-anchor="middle" class="wm-text">PROMPTGALLERY.FUN</text>
    <text x="300" y="350" text-anchor="middle" class="wm-text">PROMPTGALLERY.FUN</text>
    <text x="300" y="500" text-anchor="middle" class="wm-text">PROMPTGALLERY.FUN</text>
  </g>
</svg>
